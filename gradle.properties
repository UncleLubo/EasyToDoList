# Project-wide Gradle settings.
# Full JDK with jlink required. JBR "jcef" in ~/.jbr has no jlink.exe and breaks AGP.
# Change/remove on other PCs if needed (JDK 17 or 21 with jlink is fine).
# IMPORTANT: Do NOT let the IDE override this setting.
# The build requires a full JDK with 'jlink' to be present.
org.gradle.java.home=C:/Users/lubom/.jdks/corretto-21.0.9
